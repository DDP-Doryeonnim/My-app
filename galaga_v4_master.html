
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Galaga V4: EMP Master Edition</title>
    <style>
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #00050a; border: 2px solid #333; box-shadow: 0 0 25px rgba(0,255,255,0.3); }
        #ui { position: absolute; top: 20px; width: 600px; display: flex; justify-content: space-between; font-size: 18px; pointer-events: none; }
        .info { color: #00ffcc; text-shadow: 0 0 5px cyan; }
        #message { position: absolute; font-size: 45px; color: #00ffff; text-align: center; pointer-events: none; z-index: 10; font-weight: bold; }
        #emp-alert { position: absolute; bottom: 80px; font-size: 24px; color: #ff00ff; text-shadow: 0 0 10px #ff00ff; display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div>SCORE: <span id="score" class="info">0</span></div>
        <div>STAGE: <span id="stage" class="info">1</span></div>
        <div>LIVES: <span id="lives" class="info">10</span></div>
        <div>EMP (A): <span id="emp-count" class="info">10</span></div>
    </div>
    <div id="message"></div>
    <div id="emp-alert">SYSTEM OVERLOAD: EMP ACTIVE</div>
    <canvas id="gameCanvas" width="500" height="700"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const msg = document.getElementById('message');
        const empAlert = document.getElementById('emp-alert');

        let score = 0;
        let stage = 1;
        let lives = 10;
        let gameActive = true;
        let keys = {};

        const PLAYER_SPEED = 6;
        const BULLET_SPEED = 16; 
        const MAX_STAGES = 10;

        let player = { x: 250, y: 650, w: 30, h: 30 };
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let particles = [];
        let lastFired = 0;

        let empActive = false;
        let empTimeRemaining = 0;
        let empCharges = 10; // [변경] EMP 10개

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'KeyA' && empCharges > 0 && !empActive && gameActive) {
                activateEMP();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function activateEMP() {
            empActive = true;
            empCharges--;
            empTimeRemaining = 120; // 약 2초
            
            // [추가] EMP 발사 시 적의 미사일 즉시 제거
            enemyBullets = [];
            
            document.getElementById('emp-count').innerText = empCharges;
            empAlert.style.display = 'block';
            setTimeout(() => { empAlert.style.display = 'none'; }, 2000);
        }

        function initStage(s) {
            enemies = [];
            enemyBullets = [];
            const rows = 3 + Math.floor(s / 3);
            const cols = 6 + Math.floor(s / 4);
            for(let r = 0; r < rows; r++) {
                for(let c = 0; c < cols; c++) {
                    enemies.push({
                        originX: 80 + c * 50, originY: 80 + r * 45,
                        x: 80 + c * 50, y: 80 + r * 45,
                        alive: true, state: 'FORMATION',
                        diveAngle: 0, color: r === 0 ? '#ff0055' : (r === 1 ? '#00ccff' : '#00ff66'),
                        hp: r === 0 ? 2 : 1, shakeX: 0, shakeY: 0
                    });
                }
            }
            showMessage(`STAGE ${s}`, 2000);
        }

        function showMessage(text, duration) {
            msg.innerText = text;
            setTimeout(() => { if(msg.innerText === text) msg.innerText = ''; }, duration);
        }

        function update() {
            if(!gameActive) return;

            if(empActive) {
                empTimeRemaining--;
                if(empTimeRemaining <= 0) empActive = false;
            }

            // 아군 이동 및 발사 (EMP 상태와 무관하게 정상 작동)
            if(keys['ArrowLeft'] && player.x > 15) player.x -= PLAYER_SPEED;
            if(keys['ArrowRight'] && player.x < canvas.width - 15) player.x += PLAYER_SPEED;
            
            if(keys['Space'] && Date.now() - lastFired > 180) {
                bullets.push({ x: player.x - 10, y: player.y - 15 });
                bullets.push({ x: player.x + 10, y: player.y - 15 });
                lastFired = Date.now();
            }

            bullets.forEach((b, i) => {
                b.y -= BULLET_SPEED;
                if(b.y < -20) bullets.splice(i, 1);
            });

            enemyBullets.forEach((eb, i) => {
                eb.y += (3 + stage * 0.3) * 0.5; 
                if(eb.y > canvas.height) enemyBullets.splice(i, 1);
                if(Math.abs(eb.x - player.x) < 15 && Math.abs(eb.y - player.y) < 15) {
                    enemyBullets.splice(i, 1);
                    die();
                }
            });

            let allDead = true;
            enemies.forEach(e => {
                if(!e.alive) return;
                allDead = false;

                if(empActive) {
                    // 적 정지 및 강한 진동
                    e.shakeX = (Math.random() - 0.5) * 12;
                    e.shakeY = (Math.random() - 0.5) * 12;
                } else {
                    e.shakeX = 0; e.shakeY = 0;
                    if(e.state === 'FORMATION') {
                        e.x = e.originX + Math.sin(Date.now() / 500) * 20;
                        e.y = e.originY + Math.cos(Date.now() / 1000) * 5;
                        if(Math.random() < 0.001 * stage) { e.state = 'DIVING'; e.diveAngle = 0; }
                    } else if(e.state === 'DIVING') {
                        e.y += (2.5 + stage * 0.4);
                        e.x += Math.sin(e.diveAngle) * 5;
                        e.diveAngle += 0.1;
                        if(e.y > canvas.height) e.y = -50;
                        if(e.y > e.originY && e.y < e.originY + 10 && Math.abs(e.x - e.originX) < 20) e.state = 'FORMATION';
                        if(Math.abs(e.x - player.x) < 25 && Math.abs(e.y - player.y) < 25) die();
                    }

                    if(Math.random() < 0.002 * stage && enemyBullets.length < 3 + stage) {
                        enemyBullets.push({ x: e.x, y: e.y });
                    }
                }

                bullets.forEach((b, bi) => {
                    if(Math.abs(b.x - (e.x + e.shakeX)) < 22 && Math.abs(b.y - (e.y + e.shakeY)) < 22) {
                        e.hp--;
                        bullets.splice(bi, 1);
                        if(e.hp <= 0) {
                            e.alive = false;
                            score += 100 * stage;
                            spawnExplosion(e.x, e.y, e.color);
                        }
                    }
                });
            });

            if(allDead && gameActive) {
                if(stage < MAX_STAGES) { 
                    stage++; 
                    document.getElementById('stage').innerText = stage; 
                    initStage(stage); 
                    empCharges = 10; // 스테이지 클리어 시 보충
                    document.getElementById('emp-count').innerText = empCharges; 
                }
                else gameWin();
            }
            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = lives;
        }

        function die() {
            lives--;
            spawnExplosion(player.x, player.y, 'white');
            if(lives <= 0) { gameActive = false; showMessage("SYSTEM FAILURE", 99999); }
            else { player.x = 250; showMessage("REDEPLOYING", 1000); }
        }

        function spawnExplosion(x, y, color) {
            for(let i=0; i<12; i++) {
                particles.push({ x: x, y: y, dx: (Math.random()-0.5)*12, dy: (Math.random()-0.5)*12, life: 25, color: color });
            }
        }

        function gameWin() { gameActive = false; showMessage("GALAXY SAVED!", 99999); }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if(empActive) {
                ctx.fillStyle = (Math.floor(Date.now()/50) % 2 === 0) ? 'rgba(0, 255, 255, 0.15)' : 'rgba(255, 0, 255, 0.15)';
                ctx.fillRect(0,0, canvas.width, canvas.height);
            }

            ctx.fillStyle = '#fff';
            for(let i=0; i<60; i++) ctx.fillRect((Math.random()*canvas.width), (Date.now()/15 + i*80) % canvas.height, 1, 1);
            
            if(gameActive) {
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.moveTo(player.x, player.y - 15);
                ctx.lineTo(player.x + 15, player.y + 15);
                ctx.lineTo(player.x - 15, player.y + 15);
                ctx.fill();
                ctx.fillStyle = '#00ffcc';
                ctx.fillRect(player.x - 18, player.y + 5, 6, 12);
                ctx.fillRect(player.x + 12, player.y + 5, 6, 12);
            }

            enemies.forEach(e => {
                if(!e.alive) return;
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.ellipse(e.x + e.shakeX, e.y + e.shakeY, 13, 11, e.state === 'DIVING' ? Math.PI : 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.fillRect(e.x + e.shakeX - 6, e.y + e.shakeY - 8, 3, 3);
                ctx.fillRect(e.x + e.shakeX + 3, e.y + e.shakeY - 8, 3, 3);
            });

            ctx.fillStyle = '#00ffff';
            bullets.forEach(b => {
                ctx.shadowBlur = 10; ctx.shadowColor = '#00ffff';
                ctx.fillRect(b.x - 1.5, b.y, 3, 14);
                ctx.shadowBlur = 0;
            });
            
            ctx.fillStyle = '#ff0';
            enemyBullets.forEach(eb => { ctx.beginPath(); ctx.arc(eb.x, eb.y, 3.5, 0, Math.PI*2); ctx.fill(); });

            particles.forEach((p, i) => {
                p.x += p.dx; p.y += p.dy; p.life--;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 25;
                ctx.fillRect(p.x, p.y, 3, 3);
                if(p.life <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1.0;
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        initStage(1);
        gameLoop();
    </script>
</body>
</html>
