
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Galaga V6: 100 Stages Edition</title>
    <style>
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #game-container { position: relative; }
        canvas { background: #00050a; border: 2px solid #333; box-shadow: 0 0 25px rgba(0,255,255,0.3); }
        
        /* UI Panels */
        #top-ui { position: absolute; top: -50px; width: 100%; display: flex; justify-content: space-between; font-size: 18px; color: #00ffcc; }
        #controls { margin-top: 20px; display: flex; gap: 10px; }
        button { background: #111; color: #00ffcc; border: 1px solid #00ffcc; padding: 10px 20px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.2s; }
        button:hover { background: #00ffcc; color: #000; }
        button:disabled { border-color: #444; color: #444; cursor: not-allowed; }

        /* Overlays */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #stage-banner { font-size: 50px; color: #ffff00; text-shadow: 0 0 20px #ffff00; margin-bottom: 20px; text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="top-ui">
            <div>SCORE: <span id="score">0</span></div>
            <div>STAGE: <span id="stage">1</span>/100</div>
            <div>LIVES: <span id="lives">10</span></div>
            <div>EMP(A): <span id="emp">10</span></div>
        </div>

        <canvas id="gameCanvas" width="500" height="700"></canvas>

        <div id="overlay">
            <h1 id="stage-banner">GALAGA V6<br><span style="font-size:20px; color:cyan;">100 STAGES MASTER</span></h1>
            <button id="startBtn" onclick="startGame()">START MISSION</button>
        </div>
    </div>

    <div id="controls">
        <button id="pauseBtn" onclick="togglePause()" disabled>PAUSE</button>
        <button id="exitBtn" onclick="exitGame()">EXIT (RESET)</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const stageBanner = document.getElementById('stage-banner');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        // Global State
        let score = 0;
        let stage = 1;
        let lives = 10;
        let empCharges = 10;
        let gameActive = false;
        let isPaused = false;
        let gameState = 'IDLE'; // IDLE, INTRO, PLAYING, GAMEOVER
        let introTimer = 0;
        let lastFired = 0;
        let keys = {};

        // Constants
        const MAX_STAGES = 100;
        const PLAYER_SPEED = 6;
        const BULLET_SPEED = 16;

        let player = { x: 250, y: 650 };
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let particles = [];
        let empActive = false;
        let empTime = 0;

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'KeyA' && empCharges > 0 && !empActive && gameState === 'PLAYING' && !isPaused) {
                activateEMP();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function startGame() {
            score = 0; stage = 1; lives = 10; empCharges = 10;
            overlay.classList.add('hidden');
            pauseBtn.disabled = false;
            initStage(1);
            gameActive = true;
        }

        function togglePause() {
            if(gameState !== 'PLAYING' && gameState !== 'INTRO') return;
            isPaused = !isPaused;
            pauseBtn.innerText = isPaused ? "RESUME" : "PAUSE";
            if(isPaused) {
                stageBanner.innerText = "PAUSED";
                stageBanner.style.opacity = 1;
                overlay.classList.remove('hidden');
                startBtn.classList.add('hidden');
            } else {
                overlay.classList.add('hidden');
                startBtn.classList.remove('hidden');
            }
        }

        function exitGame() {
            location.reload();
        }

        function activateEMP() {
            empActive = true;
            empCharges--;
            empTime = 120;
            enemyBullets = [];
            document.getElementById('emp').innerText = empCharges;
        }

        function initStage(s) {
            gameState = 'INTRO';
            introTimer = 120;
            enemies = [];
            enemyBullets = [];
            bullets = [];
            empActive = false;
            
            stageBanner.innerText = `STAGE ${s}`;
            overlay.classList.remove('hidden');
            startBtn.classList.add('hidden');

            const rows = Math.min(6, 3 + Math.floor(s / 10));
            const cols = Math.min(10, 6 + Math.floor(s / 15));
            let delay = 0;

            for(let r = 0; r < rows; r++) {
                for(let c = 0; c < cols; c++) {
                    enemies.push({
                        targetX: 60 + c * 42,
                        targetY: 80 + r * 40,
                        x: (c % 2 === 0) ? -50 : canvas.width + 50,
                        y: -50,
                        alive: true,
                        state: 'ENTRY',
                        delay: delay * 4,
                        color: `hsl(${200 + (r * 30)}, 80%, 60%)`,
                        hp: r === 0 ? 2 : 1,
                        diveAngle: 0
                    });
                    delay++;
                }
            }
        }

        function update() {
            if(!gameActive || isPaused) return;

            if(gameState === 'INTRO') {
                introTimer--;
                if(introTimer <= 0) {
                    gameState = 'PLAYING';
                    overlay.classList.add('hidden');
                }
            }

            if(empActive) {
                empTime--;
                if(empTime <= 0) empActive = false;
            }

            // Player Logic
            if(keys['ArrowLeft'] && player.x > 20) player.x -= PLAYER_SPEED;
            if(keys['ArrowRight'] && player.x < canvas.width - 20) player.x += PLAYER_SPEED;
            
            if(gameState === 'PLAYING' && keys['Space'] && Date.now() - lastFired > 180) {
                bullets.push({ x: player.x - 10, y: player.y - 15 });
                bullets.push({ x: player.x + 10, y: player.y - 15 });
                lastFired = Date.now();
            }

            bullets.forEach((b, i) => {
                b.y -= BULLET_SPEED;
                if(b.y < -20) bullets.splice(i, 1);
            });

            // Enemy Projectiles
            enemyBullets.forEach((eb, i) => {
                // Difficulty Scaling: v = base * (1 + 0.02 * stage)
                eb.y += (3 + stage * 0.1) * 0.5; 
                if(eb.y > canvas.height) enemyBullets.splice(i, 1);
                if(Math.abs(eb.x - player.x) < 15 && Math.abs(eb.y - player.y) < 15) {
                    enemyBullets.splice(i, 1);
                    die();
                }
            });

            let allReadyAndDead = true;
            enemies.forEach(e => {
                if(!e.alive) return;
                allReadyAndDead = false;

                if(gameState === 'PLAYING') {
                    if(empActive) {
                        e.shakeX = (Math.random() - 0.5) * 10;
                        e.shakeY = (Math.random() - 0.5) * 10;
                    } else {
                        e.shakeX = 0; e.shakeY = 0;
                        if(e.state === 'ENTRY') {
                            if(e.delay > 0) e.delay--;
                            else {
                                e.x += (e.targetX - e.x) * 0.05;
                                e.y += (e.targetY - e.y) * 0.05;
                                if(Math.abs(e.x - e.targetX) < 1) e.state = 'FORMATION';
                            }
                        } else if(e.state === 'FORMATION') {
                            e.currentX = e.x + Math.sin(Date.now() / 500) * 15;
                            e.currentY = e.y + Math.cos(Date.now() / 1000) * 5;
                            if(Math.random() < 0.0005 * stage) { e.state = 'DIVING'; e.diveAngle = 0; }
                        } else if(e.state === 'DIVING') {
                            e.currentY += (2 + stage * 0.05);
                            e.currentX += Math.sin(e.diveAngle) * 4;
                            e.diveAngle += 0.1;
                            if(e.currentY > canvas.height) e.currentY = -50;
                            if(e.currentY > e.y && e.currentY < e.y + 10 && Math.abs(e.currentX - e.x) < 20) e.state = 'FORMATION';
                            if(Math.abs(e.currentX - player.x) < 25 && Math.abs(e.currentY - player.y) < 25) die();
                        }

                        // Enemy fire
                        if(e.state !== 'ENTRY' && Math.random() < 0.001 * stage && enemyBullets.length < 2 + (stage/10)) {
                            enemyBullets.push({ x: e.currentX || e.x, y: e.currentY || e.y });
                        }
                    }
                }

                // Hit Detection
                bullets.forEach((b, bi) => {
                    const ex = e.currentX || e.x;
                    const ey = e.currentY || e.y;
                    if(Math.abs(b.x - ex) < 20 && Math.abs(b.y - ey) < 20) {
                        e.hp--;
                        bullets.splice(bi, 1);
                        if(e.hp <= 0) {
                            e.alive = false;
                            score += 100;
                            spawnExplosion(ex, ey, e.color);
                        }
                    }
                });
            });

            if(allReadyAndDead && gameState === 'PLAYING') {
                if(stage < MAX_STAGES) { 
                    stage++; 
                    document.getElementById('stage').innerText = stage; 
                    initStage(stage); 
                    empCharges = 10;
                    document.getElementById('emp').innerText = empCharges;
                } else {
                    victory();
                }
            }
            
            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = lives;
        }

        function die() {
            lives--;
            spawnExplosion(player.x, player.y, 'white');
            if(lives <= 0) { 
                gameActive = false; 
                gameState = 'GAMEOVER';
                stageBanner.innerText = "GAME OVER";
                overlay.classList.remove('hidden');
                startBtn.innerText = "TRY AGAIN";
                startBtn.classList.remove('hidden');
            } else { 
                player.x = 250;
            }
        }

        function victory() {
            gameActive = false;
            stageBanner.innerText = "100 STAGES CLEARED!";
            overlay.classList.remove('hidden');
            startBtn.classList.remove('hidden');
        }

        function spawnExplosion(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({ x: x, y: y, dx: (Math.random()-0.5)*10, dy: (Math.random()-0.5)*10, life: 20, color: color });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // EMP Effect
            if(empActive && Math.floor(Date.now()/50)%2===0) {
                ctx.fillStyle = 'rgba(255,0,255,0.1)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
            }

            // BG
            ctx.fillStyle = '#fff';
            for(let i=0; i<40; i++) ctx.fillRect((Math.random()*canvas.width), (Date.now()/20 + i*100) % canvas.height, 1, 1);
            
            // Player
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - 15);
            ctx.lineTo(player.x + 15, player.y + 15);
            ctx.lineTo(player.x - 15, player.y + 15);
            ctx.fill();

            // Enemies
            enemies.forEach(e => {
                if(!e.alive) return;
                ctx.fillStyle = e.color;
                const ex = (e.currentX || e.x) + (e.shakeX || 0);
                const ey = (e.currentY || e.y) + (e.shakeY || 0);
                ctx.beginPath();
                ctx.ellipse(ex, ey, 12, 10, (e.state==='DIVING'||e.state==='ENTRY')?Math.PI:0, 0, Math.PI*2);
                ctx.fill();
            });

            // Bullets
            ctx.fillStyle = '#00ffff';
            bullets.forEach(b => ctx.fillRect(b.x-1, b.y, 3, 12));
            ctx.fillStyle = '#ff0';
            enemyBullets.forEach(eb => { ctx.beginPath(); ctx.arc(eb.x, eb.y, 3, 0, Math.PI*2); ctx.fill(); });

            // Particles
            particles.forEach((p, i) => {
                p.x += p.dx; p.y += p.dy; p.life--;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 20;
                ctx.fillRect(p.x, p.y, 2, 2);
                if(p.life <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1.0;
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
