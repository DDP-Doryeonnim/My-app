<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Perfect Custom Jigsaw Puzzle</title>
    <style>
        body {
            background-color: #1e1e24;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            user-select: none;
        }
        .controls {
            background-color: #2b2b36;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        canvas {
            background-color: #121215;
            border: 2px solid #444;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        input[type="file"] { color: #aaa; }
        #message { margin-top: 15px; font-size: 1.2em; font-weight: bold; color: #f1c40f; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">
        <label for="difficulty">난이도: </label>
        <select id="difficulty">
            <option value="3">3 x 3 (9조각)</option>
            <option value="4" selected>4 x 4 (16조각)</option>
            <option value="5">5 x 5 (25조각)</option>
        </select>
        <button id="startBtn" disabled>퍼즐 생성하기</button>
    </div>

    <canvas id="puzzleCanvas" width="800" height="400"></canvas>
    <div id="message">이미지를 업로드해주세요.</div>

<script>
    const canvas = document.getElementById('puzzleCanvas');
    const ctx = canvas.getContext('2d');
    const imageInput = document.getElementById('imageInput');
    const startBtn = document.getElementById('startBtn');
    const difficultySelect = document.getElementById('difficulty');
    const message = document.getElementById('message');

    let img = new Image();
    let pieces = [];
    let puzzleWidth, puzzleHeight, pieceWidth, pieceHeight;
    
    let isDragging = false;
    let draggedPiece = null;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    // 1. 이미지 로드 처리
    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) { img.src = event.target.result; };
        reader.readAsDataURL(file);
    });

    img.onload = function() {
        startBtn.disabled = false;
        message.innerText = "이미지 준비 완료! '퍼즐 생성하기'를 누르세요.";
        
        const maxHeight = 500;
        const scale = maxHeight / img.height;
        puzzleWidth = Math.floor(img.width * scale);
        puzzleHeight = Math.floor(img.height * scale);
        
        // 왼쪽은 퍼즐판, 오른쪽은 섞이는 영역
        canvas.width = puzzleWidth * 2 + 100; 
        canvas.height = Math.max(puzzleHeight, 400); // 최소 높이 보장
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 0.4;
        ctx.drawImage(img, 0, 0, puzzleWidth, puzzleHeight);
        ctx.globalAlpha = 1.0;
    };

    // 2. 퍼즐 모양 생성 핵심 (0: 직선, 1: 볼록, 2: 오목)
    function generatePath(w, h, tabs) {
        const path = new Path2D();
        const ts = Math.min(w, h) * 0.25; // 탭(볼록/오목) 크기

        path.moveTo(0, 0);

        // 위쪽 테두리 (Top)
        if (tabs[0] === 0) path.lineTo(w, 0);
        else {
            const sign = tabs[0] === 1 ? -1 : 1;
            path.bezierCurveTo(w*0.2, 0, w*0.3, ts*sign, w*0.5, ts*sign);
            path.bezierCurveTo(w*0.7, ts*sign, w*0.8, 0, w, 0);
        }

        // 오른쪽 테두리 (Right)
        if (tabs[1] === 0) path.lineTo(w, h);
        else {
            const sign = tabs[1] === 1 ? 1 : -1;
            path.bezierCurveTo(w, h*0.2, w+ts*sign, h*0.3, w+ts*sign, h*0.5);
            path.bezierCurveTo(w+ts*sign, h*0.7, w, h*0.8, w, h);
        }

        // 아래쪽 테두리 (Bottom)
        if (tabs[2] === 0) path.lineTo(0, h);
        else {
            const sign = tabs[2] === 1 ? 1 : -1;
            path.bezierCurveTo(w*0.8, h, w*0.7, h+ts*sign, w*0.5, h+ts*sign);
            path.bezierCurveTo(w*0.3, h+ts*sign, w*0.2, h, 0, h);
        }

        // 왼쪽 테두리 (Left)
        if (tabs[3] === 0) path.lineTo(0, 0);
        else {
            const sign = tabs[3] === 1 ? -1 : 1;
            path.bezierCurveTo(0, h*0.8, ts*sign, h*0.7, ts*sign, h*0.5);
            path.bezierCurveTo(ts*sign, h*0.3, 0, h*0.2, 0, 0);
        }

        path.closePath();
        return path;
    }

    // 3. 퍼즐 조각 분할 및 시작
    startBtn.addEventListener('click', function() {
        const gridSize = parseInt(difficultySelect.value);
        pieceWidth = puzzleWidth / gridSize;
        pieceHeight = puzzleHeight / gridSize;
        pieces = [];

        // 테두리 맞물림 정보 생성
        const tabsGrid = Array.from({ length: gridSize }, () => Array(gridSize).fill([]));
        for (let y = 0; y < gridSize; y++) {
            for (let x = 0; x < gridSize; x++) {
                let top = (y === 0) ? 0 : (tabsGrid[y-1][x][2] === 1 ? 2 : 1);
                let left = (x === 0) ? 0 : (tabsGrid[y][x-1][1] === 1 ? 2 : 1);
                let right = (x === gridSize - 1) ? 0 : (Math.random() > 0.5 ? 1 : 2);
                let bottom = (y === gridSize - 1) ? 0 : (Math.random() > 0.5 ? 1 : 2);
                tabsGrid[y][x] = [top, right, bottom, left];
            }
        }

        for (let y = 0; y < gridSize; y++) {
            for (let x = 0; x < gridSize; x++) {
                let piece = {
                    col: x, row: y,
                    correctX: x * pieceWidth,
                    correctY: y * pieceHeight,
                    currentX: puzzleWidth + 50 + Math.random() * (puzzleWidth - pieceWidth),
                    currentY: 20 + Math.random() * (canvas.height - pieceHeight - 40),
                    isSnapped: false,
                    path: generatePath(pieceWidth, pieceHeight, tabsGrid[y][x])
                };
                pieces.push(piece);
            }
        }
        
        message.innerText = "조각을 드래그하여 퍼즐을 완성하세요!";
        drawAll();
    });

    // 4. 화면 렌더링
    function drawAll() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 정답판 테두리 그리기
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 2;
        ctx.strokeRect(0, 0, puzzleWidth, puzzleHeight);

        // 스냅된 조각을 먼저 그리고, 움직이는 조각을 가장 위에 그리기
        pieces.forEach(p => { if(p.isSnapped) drawPiece(p); });
        pieces.forEach(p => { if(!p.isSnapped) drawPiece(p); });
    }

    function drawPiece(p) {
        ctx.save();
        ctx.translate(p.currentX, p.currentY);
        
        // 그림자 효과 (잡고 있을 때만 강조)
        if (draggedPiece === p) {
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 5;
            ctx.shadowOffsetY = 5;
        }

        ctx.clip(p.path); // 경로 모양대로 마스킹

        // 마스킹된 영역 안에 이미지를 그립니다. (핵심 로직)
        ctx.drawImage(img, 0, 0, img.width, img.height, -p.correctX, -p.correctY, puzzleWidth, puzzleHeight);
        
        ctx.shadowColor = 'transparent'; // 그림자 초기화 후 테두리 그리기
        ctx.lineWidth = p.isSnapped ? 0.5 : 2;
        ctx.strokeStyle = p.isSnapped ? '#333' : '#eee';
        ctx.stroke(p.path);
        
        ctx.restore();
    }

    // 5. 마우스 이벤트 (정밀 충돌 판정 적용)
    canvas.addEventListener('mousedown', function(e) {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        // 가장 위에 있는 조각부터 탐색
        for (let i = pieces.length - 1; i >= 0; i--) {
            let p = pieces[i];
            if (p.isSnapped) continue;

            // 정밀 충돌 판정 (isPointInPath)
            ctx.save();
            ctx.translate(p.currentX, p.currentY);
            let hit = ctx.isPointInPath(p.path, mouseX, mouseY);
            ctx.restore();

            if (hit) {
                isDragging = true;
                draggedPiece = p;
                dragOffsetX = mouseX - p.currentX;
                dragOffsetY = mouseY - p.currentY;
                
                // 선택한 조각을 배열의 맨 끝(화면 최상단)으로 이동
                pieces.splice(i, 1);
                pieces.push(p);
                drawAll();
                break;
            }
        }
    });

    canvas.addEventListener('mousemove', function(e) {
        if (isDragging && draggedPiece) {
            const rect = canvas.getBoundingClientRect();
            draggedPiece.currentX = (e.clientX - rect.left) - dragOffsetX;
            draggedPiece.currentY = (e.clientY - rect.top) - dragOffsetY;
            drawAll();
        }
    });

    canvas.addEventListener('mouseup', function(e) {
        if (isDragging && draggedPiece) {
            // 스냅(제자리 달라붙기) 범위: 25 픽셀 이내
            const snapRange = 25;
            if (Math.abs(draggedPiece.currentX - draggedPiece.correctX) < snapRange &&
                Math.abs(draggedPiece.currentY - draggedPiece.correctY) < snapRange) {
                
                draggedPiece.currentX = draggedPiece.correctX;
                draggedPiece.currentY = draggedPiece.correctY;
                draggedPiece.isSnapped = true;
            }

            isDragging = false;
            draggedPiece = null;
            drawAll();
            
            if (pieces.every(p => p.isSnapped) && pieces.length > 0) {
                message.style.color = "#2ecc71";
                message.innerText = "축하합니다! 완벽하게 맞추셨습니다!";
            }
        }
    });

    canvas.addEventListener('mouseleave', () => { isDragging = false; draggedPiece = null; drawAll(); });

</script>
</body>
</html>
