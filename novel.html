<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Shooter Pro - Ultra</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020617;
            font-family: 'Syncopate', 'Nanum Gothic', sans-serif;
            color: #f8fafc;
        }

        canvas {
            display: block;
            cursor: none;
        }

        #hud {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            padding: 15px 50px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 100;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        #target-display {
            color: #f43f5e;
        }

        #vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>

    <div id="vignette"></div>
    
    <div id="hud">
        <div class="stat-item">
            <div class="stat-label">Next Target</div>
            <div id="target-display" class="stat-value">01</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Score</div>
            <div id="score-display" class="stat-value">0000</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Time</div>
            <div id="time-display" class="stat-value">0.0s</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let targets = [];
        let particles = [];
        let score = 0;
        let startTime = Date.now();
        let currentTargetNum = 1;
        let mouse = { x: 0, y: 0 };
        let isGameOver = false;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        resize();

        // 이미지 로드 (경로: /imahe/imageXX.JPG)
        const images = {};
        for (let i = 1; i <= 10; i++) {
            const img = new Image();
            const numStr = i < 10 ? `0${i}` : `${i}`;
            img.src = `/imahe/image${numStr}.JPG`; 
            images[i] = img;
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 3 + 1;
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 12 + 4;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
                this.alpha = 1;
                this.gravity = 0.25;
                this.friction = 0.96;
            }
            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.015;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Target {
            constructor(id) {
                this.id = id;
                this.radius = 60;
                this.reset();
                this.angle = Math.random() * Math.PI * 2;
                this.pulse = 0;
            }
            reset() {
                this.x = Math.random() * (width - 120) + 60;
                this.y = Math.random() * (height - 120) + 60;
                const speed = 1.5 + (this.id * 0.3);
                this.vx = (Math.random() - 0.5) * speed;
                this.vy = (Math.random() - 0.5) * speed;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < this.radius || this.x > width - this.radius) this.vx *= -1;
                if (this.y < this.radius || this.y > height - this.radius) this.vy *= -1;
                this.pulse += 0.05
