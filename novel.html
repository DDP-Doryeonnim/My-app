<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Shooter Pro - Ultra</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020617;
            font-family: 'Syncopate', 'Nanum Gothic', sans-serif;
            color: #f8fafc;
        }

        canvas {
            display: block;
            cursor: none;
        }

        #hud {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            padding: 15px 50px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 100;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        #target-display {
            color: #f43f5e;
        }

        #stage-display {
            color: #10b981;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        #vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>

    <div id="vignette"></div>
    
    <div id="hud">
        <div class="stat-item">
            <div class="stat-label">Stage</div>
            <div id="stage-display" class="stat-value">01</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Next Target</div>
            <div id="target-display" class="stat-value">01</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Score</div>
            <div id="score-display" class="stat-value">0000</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Time</div>
            <div id="time-display" class="stat-value">0.0s</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let targets = [];
        let particles = [];
        let score = 0;
        let startTime = Date.now();
        let finalTime = 0;
        let currentTargetNum = 1;
        let mouse = { x: 0, y: 0 };
        let isGameOver = false;

        let currentStage = 1;
        const maxStage = 10; 
        let targetsInStage = 10;
        let stageTransitionTimer = 0;

        // --- 사운드(Web Audio API) 설정 ---
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playHitSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.type = 'sine'; // 부드럽고 맑은 소리
            osc.frequency.setValueAtTime(600, audioCtx.currentTime); // 시작 주파수
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1); // 빠르게 높아지는 경쾌한 소리

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playMissSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.type = 'square'; // 둔탁하고 약간 거친 소리
            osc.frequency.setValueAtTime(200, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15); // 낮아지는 소리

            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }
        // ---------------------------------

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        resize();

        const SECRET_IMAGES = [
            'YoomiImage/Youmi001.jpg', 'YoomiImage/Youmi002.jpg', 'YoomiImage/Youmi003.jpg', 'YoomiImage/Youmi004.jpg',
            'YoomiImage/Youmi005.jpg', 'YoomiImage/Youmi006.jpg', 'YoomiImage/Youmi007.jpg', 'YoomiImage/Youmi008.jpg',
            'YoomiImage/Youmi009.jpg', 'YoomiImage/Youmi010.jpg', 'YoomiImage/Youmi011.jpg', 'YoomiImage/Youmi012.jpg',
            'YoomiImage/Youmi013.jpg', 'YoomiImage/Youmi014.jpg', 'YoomiImage/Youmi015.jpg', 'YoomiImage/Youmi016.jpg',
            'YoomiImage/Youmi017.jpg', 'YoomiImage/Youmi018.jpg', 'YoomiImage/Youmi019.jpg', 'YoomiImage/Youmi020.jpg',
            'YoomiImage/Youmi021.jpg', 'YoomiImage/Youmi022.jpg', 'YoomiImage/Youmi023.jpg', 'YoomiImage/Youmi024.jpg',
            'YoomiImage/Youmi025.jpg', 'YoomiImage/Youmi026.jpg', 'YoomiImage/Youmi027.jpg', 'YoomiImage/Youmi028.jpg',
            'YoomiImage/Youmi029.jpg', 'YoomiImage/Youmi030.jpg', 'YoomiImage/Youmi031.jpg', 'YoomiImage/Youmi032.jpg',
            'YoomiImage/Youmi033.jpg', 'YoomiImage/Youmi034.jpg', 'YoomiImage/Youmi035.jpg', 'YoomiImage/Youmi036.jpg',
            'YoomiImage/Youmi037.jpg', 'YoomiImage/Youmi038.jpg', 'YoomiImage/Youmi039.jpg', 'YoomiImage/Youmi040.jpg',
            'YoomiImage/Youmi041.jpg', 'YoomiImage/Youmi042.jpg', 'YoomiImage/Youmi043.jpg', 'YoomiImage/Youmi044.jpg'
        ];

        const loadedImages = [];
        SECRET_IMAGES.forEach(src => {
            const img = new Image();
            img.src = src;
            loadedImages.push(img);
        });

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 3 + 1;
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 12 + 4;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
                this.alpha = 1;
                this.gravity = 0.25;
                this.friction = 0.96;
            }
            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.015;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Target {
            constructor(id, radius, speedMultiplier, img) {
                this.id = id;
                this.radius = radius;
                this.speedMultiplier = speedMultiplier;
                this.img = img;
                this.reset();
                this.pulse = 0;
            }
            reset() {
                this.x = Math.random() * (width - this.radius * 4) + this.radius * 2;
                this.y = Math.random() * (height - this.radius * 4) + this.radius * 2;
                
                const baseSpeed = 1.0 + (this.id * 0.15); 
                const speed = baseSpeed * this.speedMultiplier;
                
                this.vx = (Math.random() - 0.5) * speed;
                this.vy = (Math.random() - 0.5) * speed;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.x < this.radius || this.x > width - this.radius) this.vx *= -1;
                if (this.y < this.radius || this.y > height - this.radius) this.vy *= -1;
                
                this.pulse += 0.05;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(0,0,0,0.5)';

                if (this.id === currentTargetNum) {
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = '#f43f5e';
                    const s = 1 + Math.sin(this.pulse) * 0.05;
                    ctx.translate(this.x, this.y);
                    ctx.scale(s, s);
                    ctx.translate(-this.x, -this.y);
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.clip(); 

                if (this.img && this.img.complete && this.img.naturalWidth !== 0) {
                    ctx.drawImage(this.img, this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                } else {
                    ctx.fillStyle = '#1e293b';
                    ctx.fill();
                    ctx.fillStyle = '#f8fafc';
                    ctx.font = `bold ${Math.max(10, this.radius * 0.8)}px Syncopate`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.id < 10 ? `0${this.id}` : this.id, this.x, this.y);
                }

                ctx.restore();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.lineWidth = 3;
                ctx.strokeStyle = this.id === currentTargetNum ? '#f43f5e' : 'rgba(255,255,255,0.2)';
                ctx.stroke();
            }
        }

        function startStage(stage) {
            targets = [];
            currentTargetNum = 1;
            
            targetsInStage = Math.floor(10 + (stage - 1) * (34 / 9));
            if (targetsInStage > 44) targetsInStage = 44;

            const speedMultiplier = 1 + (stage - 1) * 0.4;

            let shuffledImages = [...loadedImages].sort(() => 0.5 - Math.random());
            let selectedImages = shuffledImages.slice(0, targetsInStage);

            for (let i = 1; i <= targetsInStage; i++) {
                const baseRadius = 60 - (stage - 1) * (40 / 9);
                const variance = (stage - 1) * (25 / 9);
                const randomRadius = baseRadius + (Math.random() * variance * 2 - variance);
                const finalRadius = Math.max(10, randomRadius);

                targets.push(new Target(i, finalRadius, speedMultiplier, selectedImages[i-1]));
            }

            document.getElementById('stage-display').innerText = stage.toString().padStart(2, '0');
            document.getElementById('target-display').innerText = '01';
            stageTransitionTimer = 120; 
        }

        startStage(currentStage);

        canvas.addEventListener('mousedown', () => {
            initAudio(); // 브라우저 사운드 정책 해결을 위한 초기화

            if (isGameOver) return;
            
            let isCorrectHit = false;

            for (let i = targets.length - 1; i >= 0; i--) {
                const t = targets[i];
                const dist = Math.hypot(mouse.x - t.x, mouse.y - t.y);
                
                if (dist < t.radius) {
                    if (t.id === currentTargetNum) {
                        isCorrectHit = true;
                        
                        playHitSound(); // 정답 타격음 재생

                        for (let j = 0; j < 40; j++) particles.push(new Particle(t.x, t.y, '#38bdf8'));
                        
                        targets.splice(i, 1);
                        score += 100 + (targetsInStage - targets.length) * 50 * currentStage;
                        currentTargetNum++;
                        
                        if (currentTargetNum > targetsInStage) {
                            if (currentStage < maxStage) {
                                currentStage++;
                                startStage(currentStage);
                            } else {
                                isGameOver = true;
                                finalTime = ((Date.now() - startTime) / 1000).toFixed(1);
                                document.getElementById('target-display').innerText = 'WIN';
                            }
                        } else {
                            document.getElementById('target-display').innerText = currentTargetNum.toString().padStart(2, '0');
                        }
                    }
                    break; 
                }
            }

            if (!isCorrectHit && !isGameOver) {
                playMissSound(); // 오답(미스샷) 타격음 재생
                
                score -= 50;
                if (score < 0) score = 0;
                
                for (let j = 0; j < 10; j++) particles.push(new Particle(mouse.x, mouse.y, '#f43f5e'));
            }

            document.getElementById('score-display').innerText = score.toString().padStart(4, '0');
        });

        function drawCrosshair() {
            ctx.save();
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 2;
            
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 20, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(mouse.x - 30, mouse.y);
            ctx.lineTo(mouse.x - 10, mouse.y);
            ctx.moveTo(mouse.x + 10, mouse.y);
            ctx.lineTo(mouse.x + 30, mouse.y);
            ctx.moveTo(mouse.x, mouse.y - 30);
            ctx.lineTo(mouse.x, mouse.y - 10);
            ctx.moveTo(mouse.x, mouse.y + 10);
            ctx.lineTo(mouse.x, mouse.y + 30);
            ctx.stroke();

            ctx.fillStyle = '#f43f5e';
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function animate() {
            ctx.fillStyle = 'rgba(2, 6, 23, 0.25)';
            ctx.fillRect(0, 0, width, height);

            if (!isGameOver) {
                const elapsed = (Date.now() - startTime) / 1000;
                document.getElementById('time-display').innerText = elapsed.toFixed(1) + 's';
            }

            targets.forEach(t => {
                t.update();
                t.draw();
            });

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }

            drawCrosshair();

            if (stageTransitionTimer > 0 && !isGameOver) {
                ctx.save();
                const alpha = Math.min(1, stageTransitionTimer / 30);
                ctx.fillStyle = `rgba(16, 185, 129, ${alpha})`;
                ctx.font = 'bold 120px Syncopate';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 30;
                ctx.shadowColor = 'rgba(16, 185, 129, 0.8)';
                ctx.fillText(`STAGE ${currentStage}`, width / 2, height / 2);
                ctx.restore();
                stageTransitionTimer--;
            }

            if (isGameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0, 0, width, height);

                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                ctx.fillStyle = '#10b981';
                ctx.font = 'bold 90px Syncopate';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#10b981';
                ctx.fillText('MISSION COMPLETE', width / 2, height / 2 - 80);

                ctx.fillStyle = '#38bdf8';
                ctx.font = 'bold 60px Syncopate';
                ctx.shadowColor = '#38bdf8';
                ctx.fillText('SCORE : ' + score, width / 2, height / 2 + 30);

                ctx.fillStyle = '#f43f5e';
                ctx.font = 'bold 50px Syncopate';
                ctx.shadowColor = '#f43f5e';
                ctx.fillText('TIME : ' + finalTime + 's', width / 2, height / 2 + 110);
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
