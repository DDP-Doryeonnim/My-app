<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Shooter Pro - Ultra</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020617;
            font-family: 'Syncopate', 'Nanum Gothic', sans-serif;
            color: #f8fafc;
        }

        canvas {
            display: block;
            cursor: none; /* 기본 마우스 커서 숨김 (커스텀 조준점 사용) */
        }

        /* HUD (Head-Up Display) 상단 UI 패널 */
        #hud {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            padding: 15px 50px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 100;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        #target-display {
            color: #f43f5e;
        }

        /* 화면 테두리 어둡게 (비네팅 효과) */
        #vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body>

    <div id="vignette"></div>
    
    <div id="hud">
        <div class="stat-item">
            <div class="stat-label">Next Target</div>
            <div id="target-display" class="stat-value">01</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Score</div>
            <div id="score-display" class="stat-value">0000</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Time</div>
            <div id="time-display" class="stat-value">0.0s</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let targets = [];
        let particles = [];
        let score = 0;
        let startTime = Date.now();
        let currentTargetNum = 1;
        let mouse = { x: 0, y: 0 };
        let isGameOver = false;

        // 윈도우 리사이즈 처리
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        
        // 마우스 좌표 추적 (커스텀 조준점용)
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        resize();

        // [핵심] 이미지 로드 (상대 경로 ./imahe/ 적용)
        const images = {};
        for (let i = 1; i <= 10; i++) {
            const img = new Image();
            const numStr = i < 10 ? `0${i}` : `${i}`;
            img.src = `./imahe/image${numStr}.JPG`; 
            images[i] = img;
        }

        // 파티클 (폭발 효과) 클래스
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 3 + 1;
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 12 + 4;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
                this.alpha = 1;
                this.gravity = 0.25;
                this.friction = 0.96;
            }
            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.015;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 타겟 (이미지 객체) 클래스
        class Target {
            constructor(id) {
                this.id = id;
                this.radius = 60;
                this.reset();
                this.pulse = 0;
            }
            reset() {
                this.x = Math.random() * (width - 120) + 60;
                this.y = Math.random() * (height - 120) + 60;
                const speed = 1.5 + (this.id * 0.3);
                this.vx = (Math.random() - 0.5) * speed;
                this.vy = (Math.random() - 0.5) * speed;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                // 화면 밖으로 나가지 않게 튕기기
                if (this.x < this.radius || this.x > width - this.radius) this.vx *= -1;
                if (this.y < this.radius || this.y > height - this.radius) this.vy *= -1;
                
                this.pulse += 0.05;
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(0,0,0,0.5)';

                // 활성화된(맞춰야 할) 타겟 강조 효과
                if (this.id === currentTargetNum) {
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = '#f43f5e';
                    const s = 1 + Math.sin(this.pulse) * 0.05;
                    ctx.translate(this.x, this.y);
                    ctx.scale(s, s);
                    ctx.translate(-this.x, -this.y);
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.clip(); // 이미지를 원형으로 자르기

                const img = images[this.id];
                // 이미지가 성공적으로 로드된 경우
                if (img.complete && img.naturalWidth !== 0) {
                    ctx.drawImage(img, this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
                } else {
                    // 이미지 로드 실패 또는 지연 시 임시 UI
                    ctx.fillStyle = '#1e293b';
                    ctx.fill();
                    ctx.fillStyle = '#f8fafc';
                    ctx.font = 'bold 30px Syncopate';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(this.id < 10 ? `0${this.id}` : this.id, this.x, this.y);
                }

                ctx.restore();

                // 테두리 렌더링
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.lineWidth = 3;
                ctx.strokeStyle = this.id === currentTargetNum ? '#f43f5e' : 'rgba(255,255,255,0.2)';
                ctx.stroke();
            }
        }

        // 초기화: 타겟 10개 생성
        for (let i = 1; i <= 10; i++) targets.push(new Target(i));

        // 클릭(사격) 이벤트
        canvas.addEventListener('mousedown', () => {
            if (isGameOver) return;
            
            // 겹쳐있을 경우를 대비해 역순(위쪽 레이어 먼저)으로 검사
            for (let i = targets.length - 1; i >= 0; i--) {
                const t = targets[i];
                const dist = Math.hypot(mouse.x - t.x, mouse.y - t.y);
                
                // 마우스가 타겟 원 반경 안에 있는지 확인
                if (dist < t.radius) {
                    if (t.id === currentTargetNum) {
                        // 정답 격추: 파티클 생성
                        for (let j = 0; j < 40; j++) particles.push(new Particle(t.x, t.y, '#38bdf8'));
                        
                        targets.splice(i, 1);
                        score += 100 + (10 - targets.length) * 50;
                        currentTargetNum++;
                        
                        // UI 업데이트
                        document.getElementById('score-display').innerText = score.toString().padStart(4, '0');
                        document.getElementById('target-display').innerText = currentTargetNum <= 10 ? currentTargetNum.toString().padStart(2, '0') : 'WIN';
                        
                        // 게임 클리어 체크
                        if (currentTargetNum > 10) isGameOver = true;
                    }
                    break; // 한 발로 여러 개가 동시에 지워지지 않도록
                }
            }
        });

        // 커스텀 조준점 그리기
        function drawCrosshair() {
            ctx.save();
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 2;
            
            // 조준점 외곽 원
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 20, 0, Math.PI * 2);
            ctx.stroke();
            
            // 조준점 십자선
            ctx.beginPath();
            ctx.moveTo(mouse.x - 30, mouse.y);
            ctx.lineTo(mouse.x - 10, mouse.y);
            ctx.moveTo(mouse.x + 10, mouse.y);
            ctx.lineTo(mouse.x + 30, mouse.y);
            ctx.moveTo(mouse.x, mouse.y - 30);
            ctx.lineTo(mouse.x, mouse.y - 10);
            ctx.moveTo(mouse.x, mouse.y + 10);
            ctx.lineTo(mouse.x, mouse.y + 30);
            ctx.stroke();

            // 조준점 중앙 점
            ctx.fillStyle = '#f43f5e';
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // 메인 애니메이션 루프
        function animate() {
            // 잔상 효과 (살짝 투명하게 검은색을 덮어씌움)
            ctx.fillStyle = 'rgba(2, 6, 23, 0.25)';
            ctx.fillRect(0, 0, width, height);

            // 시간 업데이트
            if (!isGameOver) {
                const elapsed = (Date.now() - startTime) / 1000;
                document.getElementById('time-display').innerText = elapsed.toFixed(1) + 's';
            }

            // 타겟 렌더링
            targets.forEach(t => {
                t.update();
                t.draw();
            });

            // 파티클 렌더링
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }

            // 커스텀 마우스 커서는 제일 위에 그림
            drawCrosshair();

            // 게임 오버 화면 렌더링
            if (isGameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0,0,width,height);
                ctx.fillStyle = '#10b981';
                ctx.font = 'bold 80px Syncopate';
                ctx.textAlign = 'center';
                ctx.fillText('MISSION COMPLETE', width/2, height/2);
                ctx.font = '30px Syncopate';
                ctx.fillStyle = '#fff';
                ctx.fillText('FINAL SCORE: ' + score, width/2, height/2 + 80);
            }

            requestAnimationFrame(animate);
        }

        // 게임 시작
        animate();
    </script>
</body>
</html>
