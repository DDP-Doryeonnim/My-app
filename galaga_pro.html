
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Galaga Pro: 10 Stages</title>
    <style>
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { background: #00050a; border: 2px solid #333; box-shadow: 0 0 20px rgba(0,255,255,0.2); }
        #ui { position: absolute; top: 20px; width: 500px; display: flex; justify-content: space-between; font-size: 20px; pointer-events: none; }
        .info { color: #00ffcc; text-shadow: 0 0 5px cyan; }
        #message { position: absolute; font-size: 40px; color: yellow; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="info">SCORE: <span id="score">0</span></div>
        <div class="info">STAGE: <span id="stage">1</span> / 10</div>
        <div class="info">LIVES: <span id="lives">3</span></div>
    </div>
    <div id="message"></div>
    <canvas id="gameCanvas" width="500" height="700"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const msg = document.getElementById('message');

        // Game State
        let score = 0;
        let stage = 1;
        let lives = 3;
        let gameActive = true;
        let keys = {};

        // Configuration
        const PLAYER_SPEED = 6;
        const BULLET_SPEED = 8;
        const MAX_STAGES = 10;

        // Entities
        let player = { x: 250, y: 650, w: 30, h: 30 };
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let particles = [];

        // Input
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function initStage(s) {
            enemies = [];
            enemyBullets = [];
            const rows = 3 + Math.floor(s / 3);
            const cols = 6 + Math.floor(s / 4);
            
            for(let r = 0; r < rows; r++) {
                for(let c = 0; c < cols; c++) {
                    enemies.push({
                        originX: 80 + c * 50,
                        originY: 80 + r * 45,
                        x: 80 + c * 50,
                        y: 80 + r * 45,
                        w: 25, h: 25,
                        alive: true,
                        state: 'FORMATION', // FORMATION, DIVING
                        timer: Math.random() * 2000,
                        color: r === 0 ? '#ff0055' : (r === 1 ? '#00ccff' : '#00ff66'),
                        hp: r === 0 ? 2 : 1
                    });
                }
            }
            showMessage(`STAGE ${s}`, 2000);
        }

        function showMessage(text, duration) {
            msg.innerText = text;
            setTimeout(() => { msg.innerText = ''; }, duration);
        }

        function update() {
            if(!gameActive) return;

            // Player Move
            if(keys['ArrowLeft'] && player.x > 15) player.x -= PLAYER_SPEED;
            if(keys['ArrowRight'] && player.x < canvas.width - 15) player.x += PLAYER_SPEED;
            if(keys['Space'] && bullets.length < 3 + Math.floor(stage/3)) {
                if(bullets.length === 0 || bullets[bullets.length-1].y < player.y - 100) {
                    bullets.push({ x: player.x, y: player.y - 20 });
                }
            }

            // Bullets
            bullets.forEach((b, i) => {
                b.y -= BULLET_SPEED;
                if(b.y < 0) bullets.splice(i, 1);
            });

            enemyBullets.forEach((eb, i) => {
                eb.y += (4 + stage * 0.5);
                if(eb.y > canvas.height) enemyBullets.splice(i, 1);
                
                // Hit Player
                if(Math.abs(eb.x - player.x) < 15 && Math.abs(eb.y - player.y) < 15) {
                    enemyBullets.splice(i, 1);
                    die();
                }
            });

            // Enemies
            let allDead = true;
            enemies.forEach(e => {
                if(!e.alive) return;
                allDead = false;

                if(e.state === 'FORMATION') {
                    // Floating motion
                    e.x = e.originX + Math.sin(Date.now() / 500) * 20;
                    e.y = e.originY + Math.cos(Date.now() / 1000) * 5;

                    // Random Dive
                    if(Math.random() < 0.001 * stage) {
                        e.state = 'DIVING';
                        e.diveAngle = 0;
                    }
                } else if(e.state === 'DIVING') {
                    e.y += (3 + stage * 0.5);
                    e.x += Math.sin(e.diveAngle) * 5;
                    e.diveAngle += 0.1;

                    if(e.y > canvas.height) {
                        e.y = -50; // Wrap around
                    }
                    if(e.y > e.originY && e.y < e.originY + 10 && Math.abs(e.x - e.originX) < 20) {
                        e.state = 'FORMATION'; // Return to formation
                    }

                    // Collision with Player
                    if(Math.abs(e.x - player.x) < 25 && Math.abs(e.y - player.y) < 25) {
                        die();
                    }
                }

                // Enemy Shoot
                if(Math.random() < 0.005 * stage && enemyBullets.length < 5 + stage) {
                    enemyBullets.push({ x: e.x, y: e.y });
                }

                // Hit Enemy
                bullets.forEach((b, bi) => {
                    if(Math.abs(b.x - e.x) < 20 && Math.abs(b.y - e.y) < 20) {
                        e.hp--;
                        bullets.splice(bi, 1);
                        if(e.hp <= 0) {
                            e.alive = false;
                            score += 100 * stage;
                            spawnExplosion(e.x, e.y, e.color);
                        }
                    }
                });
            });

            if(allDead && gameActive) {
                if(stage < MAX_STAGES) {
                    stage++;
                    document.getElementById('stage').innerText = stage;
                    initStage(stage);
                } else {
                    gameWin();
                }
            }

            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = lives;
        }

        function die() {
            lives--;
            spawnExplosion(player.x, player.y, 'white');
            if(lives <= 0) {
                gameActive = false;
                showMessage("GAME OVER", 99999);
            } else {
                player.x = 250;
                showMessage("READY", 1000);
            }
        }

        function gameWin() {
            gameActive = false;
            showMessage("MISSION COMPLETE - EARTH SAVED!", 99999);
        }

        function spawnExplosion(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({
                    x: x, y: y,
                    dx: (Math.random()-0.5)*10,
                    dy: (Math.random()-0.5)*10,
                    life: 20,
                    color: color
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Stars
            ctx.fillStyle = '#fff';
            for(let i=0; i<50; i++) {
                ctx.fillRect((Math.random()*canvas.width), (Date.now()/20 + i*100) % canvas.height, 1, 1);
            }

            // Player
            if(gameActive) {
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.moveTo(player.x, player.y - 15);
                ctx.lineTo(player.x + 15, player.y + 15);
                ctx.lineTo(player.x - 15, player.y + 15);
                ctx.fill();
                // Wing details
                ctx.fillStyle = 'red';
                ctx.fillRect(player.x - 18, player.y + 5, 6, 10);
                ctx.fillRect(player.x + 12, player.y + 5, 6, 10);
            }

            // Enemies
            enemies.forEach(e => {
                if(!e.alive) return;
                ctx.fillStyle = e.color;
                // Draw Insect-like body
                ctx.beginPath();
                ctx.ellipse(e.x, e.y, 12, 10, e.state === 'DIVING' ? Math.PI : 0, 0, Math.PI*2);
                ctx.fill();
                // Eyes/Antenna
                ctx.fillStyle = 'white';
                ctx.fillRect(e.x - 6, e.y - 8, 3, 3);
                ctx.fillRect(e.x + 3, e.y - 8, 3, 3);
            });

            // Bullets
            ctx.fillStyle = '#fff';
            bullets.forEach(b => ctx.fillRect(b.x - 2, b.y, 4, 10));

            ctx.fillStyle = '#ff0';
            enemyBullets.forEach(eb => {
                ctx.beginPath();
                ctx.arc(eb.x, eb.y, 4, 0, Math.PI*2);
                ctx.fill();
            });

            // Particles
            particles.forEach((p, i) => {
                p.x += p.dx; p.y += p.dy;
                p.life--;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 20;
                ctx.fillRect(p.x, p.y, 3, 3);
                if(p.life <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1.0;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initStage(1);
        gameLoop();
    </script>
</body>
</html>
