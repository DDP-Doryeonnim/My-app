<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jigsaw Solitaire Puzzle</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #e0e0e0;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 8px;
        }

        #levelDisplay {
            font-size: 16px;
            color: #b0b0b0;
        }

        #helpBtn {
            background-color: #ffb703;
            color: #000;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #helpBtn:hover:not(:disabled) {
            background-color: #ffa000;
        }

        #helpBtn:disabled {
            background-color: #444;
            color: #888;
            cursor: not-allowed;
        }

        /* game-container의 height를 명시하지 않고 
          JS에서 동적으로 원본 비율(aspect-ratio)을 주입합니다.
        */
        #game-container {
            position: relative;
            width: 90vmin;
            max-width: 600px;
            background-color: #2a2a2a;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 5px;
            transition: aspect-ratio 0.3s ease;
        }

        #board {
            display: grid;
            width: 100%;
            height: 100%;
            gap: 2px;
            border-radius: 8px;
            overflow: hidden;
        }

        .tile {
            position: relative;
            background-repeat: no-repeat;
            cursor: pointer;
            transition: transform 0.15s ease-in-out, filter 0.15s ease-in-out;
            border-radius: 4px;
        }

        .tile.selected {
            transform: scale(0.92);
            filter: brightness(1.2);
            box-shadow: 0 0 0 3px #ffb703 inset;
            z-index: 10;
        }

        /* 조각 번호 표시 디자인 */
        .help-number {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background-color: rgba(0, 0, 0, 0.75);
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 4px;
            display: none;
            pointer-events: none; /* 텍스트 선택 및 클릭 방지 */
            z-index: 5;
        }

        /* 헬프 활성화 상태일 때 숫자 표시 */
        #board.show-help .help-number {
            display: block;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            z-index: 100;
            cursor: pointer;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .overlay-text {
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .overlay-sub {
            font-size: 16px;
            color: #d1d1d1;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <header>
        <h1>JIGSAW PUZZLE</h1>
        <div class="controls">
            <div id="levelDisplay">Level 1</div>
            <button id="helpBtn" onclick="useHelp()">Help (10/10)</button>
        </div>
    </header>

    <div id="game-container">
        <div id="board"></div>
        <div id="overlay" onclick="nextLevel()">
            <div class="overlay-text">Level Cleared!</div>
            <div class="overlay-sub">Tap to continue</div>
        </div>
    </div>

    <script>
        let currentLevel = 1;
        let selectedTile = null;
        let isInputLocked = false;
        
        let helpCount = 10;
        let isHelpActive = false;

        window.onload = () => {
            initLevel();
        };

        function initLevel() {
            isInputLocked = true; // 이미지 로딩 중 클릭 방지
            isHelpActive = false;
            document.getElementById('board').classList.remove('show-help');
            
            // 5레벨 단위로 조각 개수 증가
            const gridSize = 3 + Math.floor((currentLevel - 1) / 5);
            
            // 이미지 번호 랜덤 지정
            const imgNumber = Math.floor(Math.random() * 44) + 1;
            const formattedNumber = String(imgNumber).padStart(3, '0');
            const imageUrl = `YoomiImage/Youmi${formattedNumber}.jpg`; 

            document.getElementById('levelDisplay').innerText = `Level ${currentLevel}`;
            
            // 원본 이미지 비율을 계산하기 위해 메모리에 이미지 로드
            const img = new Image();
            img.onload = () => {
                // 게임 컨테이너의 가로세로 비율을 원본 이미지 비율에 맞춤
                const container = document.getElementById('game-container');
                container.style.aspectRatio = `${img.width} / ${img.height}`;
                
                const board = document.getElementById('board');
                board.innerHTML = '';
                board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
                board.style.gridTemplateRows = `repeat(${gridSize}, 1fr)`;

                let tiles = [];
                const totalTiles = gridSize * gridSize;

                for (let i = 0; i < totalTiles; i++) {
                    let tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.dataset.correct = i;

                    let row = Math.floor(i / gridSize);
                    let col = i % gridSize;
                    
                    let bgPosX = (gridSize > 1) ? (col / (gridSize - 1)) * 100 : 0;
                    let bgPosY = (gridSize > 1) ? (row / (gridSize - 1)) * 100 : 0;

                    tile.style.backgroundImage = `url('${imageUrl}')`;
                    tile.style.backgroundSize = `${gridSize * 100}% ${gridSize * 100}%`;
                    tile.style.backgroundPosition = `${bgPosX}% ${bgPosY}%`;

                    // 조각 정답 번호 표시용 엘리먼트 생성
                    let helpNum = document.createElement('div');
                    helpNum.className = 'help-number';
                    helpNum.innerText = i + 1; // 1번부터 시작하도록 표기
                    tile.appendChild(helpNum);

                    tile.addEventListener('click', () => handleTileClick(tile));
                    tiles.push(tile);
                    board.appendChild(tile);
                }

                // 퍼즐 섞기
                for (let i = totalTiles - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    swapData(tiles[i], tiles[j]);
                }

                isInputLocked = false; // 세팅 완료 후 잠금 해제
            };
            img.src = imageUrl;
        }

        function handleTileClick(tile) {
            if (isInputLocked) return;

            if (!selectedTile) {
                selectedTile = tile;
                tile.classList.add('selected');
            } else {
                if (selectedTile !== tile) {
                    swapData(selectedTile, tile);
                    checkWin();
                }
                selectedTile.classList.remove('selected');
                selectedTile = null;
            }
        }

        function swapData(tileA, tileB) {
            // 배경 이미지 위치 교환
            let tempBgPos = tileA.style.backgroundPosition;
            let tempCorrect = tileA.dataset.correct;

            tileA.style.backgroundPosition = tileB.style.backgroundPosition;
            tileA.dataset.correct = tileB.dataset.correct;

            tileB.style.backgroundPosition = tempBgPos;
            tileB.dataset.correct = tempCorrect;

            // 헬프 숫자 텍스트도 고유 인덱스에 맞춰 교환
            tileA.querySelector('.help-number').innerText = parseInt(tileA.dataset.correct, 10) + 1;
            tileB.querySelector('.help-number').innerText = parseInt(tileB.dataset.correct, 10) + 1;
        }

        function useHelp() {
            if (helpCount > 0 && !isHelpActive) {
                helpCount--;
                document.getElementById('helpBtn').innerText = `Help (${helpCount}/10)`;
                document.getElementById('board').classList.add('show-help');
                isHelpActive = true;
                
                if (helpCount === 0) {
                    document.getElementById('helpBtn').disabled = true;
                }
            }
        }

        function checkWin() {
            let tiles = document.querySelectorAll('.tile');
            let isWin = true;

            tiles.forEach((tile, index) => {
                if (parseInt(tile.dataset.correct, 10) !== index) {
                    isWin = false;
                }
            });

            if (isWin) {
                isInputLocked = true;
                setTimeout(() => {
                    document.getElementById('overlay').style.display = 'flex';
                }, 300); 
            }
        }

        function nextLevel() {
            document.getElementById('overlay').style.display = 'none';
            currentLevel++;
            initLevel();
        }
    </script>
</body>
</html>
